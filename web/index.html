<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>DangerFinger - Configure and Preview</title>
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<script src="/vendor/three/three.min.js"></script>
	<script src="/vendor/three/OrbitControls.js"></script>
	<script src="/stl_viewer.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
	<style>
		code { font-size: 0.85em; }
		.param-table td { vertical-align: middle; }
		#part-toggles { display: flex; flex-wrap: wrap; align-items: center; }
	</style>
</head>
<body class="bg-light">
	<div class="container-fluid py-3">
		<h1 class="h4 mb-3">DangerFinger - Configure and Preview</h1>

		<section class="card mb-3">
			<div class="card-header py-2">Viewer</div>
			<div class="card-body p-2">
				<div id="preview_status" class="small text-muted mb-1" aria-live="polite"></div>
				<div id="wrap" style="position:relative; min-height:280px;">
					<div id="stl_cont" style="width:100%;height:280px;visibility:hidden;border:1px solid #dee2e6; border-radius:4px;"></div>
					<img id="loader" style="position:absolute;top:50%;left:50%;margin-left:-40px;margin-top:-40px;" alt="Loading...">
				</div>
				<a id="download_btn" class="btn btn-sm btn-outline-success mt-1" style="display:none" download>Download ZIP</a>
			</div>
		</section>

		<section class="card mb-3">
			<div class="card-header py-2">Parts</div>
			<div class="card-body p-2">
				<div id="part-toggles" class="mb-2"></div>
				<div class="form-group mb-1">
					<label class="small font-weight-bold mb-1">Explode</label>
					<input type="range" min="0" max="100" value="0" class="form-control-range" id="explode" oninput="slide_change();">
				</div>
				<!-- Future: Rotate slider -->
			</div>
		</section>

		<section class="card mb-3">
			<div class="card-header py-2">Parameters</div>
			<div class="card-body p-2">
				<div id="showData"></div>
				<div id="advData"></div>
			</div>
		</section>

		<section class="card mb-3">
			<div class="card-header py-2">Saved configs</div>
			<div class="card-body p-2">
				<div id="profiles"></div>
			</div>
		</section>
	</div>

	<input type="text" id="model_info_cont" class="d-none" aria-hidden="true">

	<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
	<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
	<script src="/api.js"></script>
	<script src="/viewer.js"></script>
	<script src="/params.js"></script>
	<script src="/app.js"></script>
</body>
</html>
