<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>DangerFinger - Configure and Preview</title>
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<script src="/vendor/three/three.min.js?v=0"></script>
	<script src="/vendor/three/OrbitControls.js?v=0"></script>
	<script src="/stl_viewer.js?v=0"></script>
	<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
	<style>
		code { font-size: 0.85em; }
		.param-table td { vertical-align: middle; }
		#part-toggles { display: flex; flex-wrap: wrap; align-items: center; }
		#fs_btn { font-size: 1rem; line-height: 1; padding: 0 6px; }
		#wrap:-webkit-full-screen { background: #f0f0f0; }
		#wrap:fullscreen { background: #f0f0f0; }
		#auth-bar { background: #f8f9fa; border-bottom: 1px solid #dee2e6; padding: 4px 12px; font-size: 0.85em; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
		#auth_user_display { color: #495057; font-weight: 500; }
	</style>
</head>
<body class="bg-light">
	<div id="auth-bar">
		<span id="auth_user_display"></span>
		<button id="auth_login_btn" type="button" class="btn btn-sm btn-outline-primary">Log in</button>
		<button id="auth_logout_btn" type="button" class="btn btn-sm btn-outline-secondary" style="display:none">Log out</button>
	</div>
	<div class="container-fluid py-3">
		<div class="d-flex align-items-center mb-3">
			<h1 class="h4 mb-0">DangerFinger - Configure and Preview</h1>
			<button id="fullpage_btn" type="button" class="btn btn-sm btn-outline-primary ml-3" style="display:none" title="Open in a new window">Open full page</button>
			<button id="share_btn" type="button" class="btn btn-sm btn-outline-secondary ml-2" title="Copy a shareable link with current parameters">Share link</button>
		</div>

		<section class="card mb-3">
			<div class="card-header py-2 d-flex align-items-center justify-content-between">
				<span>Viewer</span>
				<button id="fs_btn" type="button" class="btn btn-sm btn-outline-secondary py-0" title="Toggle fullscreen" onclick="Viewer.toggleFullscreen()">⛶</button>
			</div>
			<div class="card-body p-2">
				<div id="preview_status" class="small text-muted mb-1" aria-live="polite"></div>
				<div id="wrap" style="position:relative; min-height:280px;">
					<div id="stl_cont" style="width:100%;height:280px;visibility:hidden;border:1px solid #dee2e6; border-radius:4px;"></div>
					<img id="loader" style="position:absolute;top:50%;left:50%;margin-left:-40px;margin-top:-40px;" alt="Loading...">
				</div>
				<div id="viewer_resize_handle" title="Drag to resize viewer"
					style="height:6px;cursor:ns-resize;background:linear-gradient(transparent 40%,#dee2e6 40%,#dee2e6 60%,transparent 60%),linear-gradient(90deg,transparent 33%,#dee2e6 33%,#dee2e6 66%,transparent 66%);background-size:100% 100%,8px 100%;margin:2px 0 4px;border-radius:3px;opacity:0.6;"
					onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0.6'"></div>
				<a id="download_btn" class="btn btn-sm btn-outline-success mt-1" style="display:none" download>Download ZIP</a>
			</div>
		</section>

		<section class="card mb-3">
			<div class="card-header py-2">Parts</div>
			<div class="card-body p-2">
				<div id="part-toggles" class="mb-2"></div>
				<div class="form-group mb-1">
					<label class="small font-weight-bold mb-1">Explode</label>
					<input type="range" min="0" max="100" value="0" class="form-control-range" id="explode" oninput="slide_change();">
				</div>
				<!-- Future: Rotate slider -->
			</div>
		</section>

		<section class="card mb-3">
			<div class="card-header py-2">Parameters</div>
			<div class="card-body p-2">
				<div id="showData"></div>
				<div id="advData"></div>
			</div>
		</section>

		<section class="card mb-3">
			<div class="card-header py-2">Saved configs</div>
			<div class="card-body p-2">
				<div id="profiles"></div>
			</div>
		</section>
	</div>

	<input type="text" id="model_info_cont" class="d-none" aria-hidden="true">

	<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
	<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
	<script src="/api.js?v=0"></script>
	<script src="/viewer.js?v=0"></script>
	<script src="/params.js?v=0"></script>
	<script src="/app.js?v=0"></script>
</body>
</html>
