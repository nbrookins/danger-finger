<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Danger Finger – Configure &amp; Preview</title>
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

	<script src="/stl_viewer.min.js"></script>
</head>
<body class="bg-light">
	<div class="container-fluid py-3">
		<h1 class="h4 mb-3">Danger Finger – Configure &amp; Preview</h1>

		<section class="card mb-3">
			<div class="card-header py-2">Viewer</div>
			<div class="card-body p-2">
				<div id="preview_status" class="small text-muted mb-1" aria-live="polite"></div>
				<div id="wrap" style="position:relative; min-height:280px;">
					<div id="stl_cont" style="width:100%;height:280px;visibility:hidden;border:1px solid #dee2e6; border-radius:4px;"></div>
					<img id="loader" style="position:absolute;top:50%;left:50%;margin-left:-40px;margin-top:-40px;" alt="Loading...">
				</div>
			</div>
		</section>

		<section class="card mb-3">
			<div class="card-header py-2">Part visibility</div>
			<div class="card-body p-2">
	<table id="mdata" class="mb-0">
		<tr id="mrow">
			<td>Part:</td>
			<td id="part_buttons_container"></td>
		</tr>
		<tr id="mrow">
			<td id="params-basic">Parameters:</td>
			<td id="params-basic"><input id="b_ph" type="button" value="Hide"></td>
			<td id="params-basic"><input id="b_pb" type="button" value="Standard"></td>
			<td id="params-basic"><input id="b_pa" type="button" value="Advanced"></td>
			<td id="params-basic">Explode:<br/><input type="range" min="0" max="100" value="0" class="slider" id="explode" oninput="slide_change();">
				<!--<br/>Rotate:<br/><input type="range" min="0" max="100" value="0" class="slider" id="rotate" oninput="slide_change();">-->
			</td>
		</tr>
	</table>
			</div>
		</section>

		<section class="card mb-3">
			<div class="card-header py-2">Parameters</div>
			<div class="card-body p-2">
	<p id="showData"></p>
	<p id="advData" class="mb-0"></p>
			</div>
		</section>

		<section class="card mb-3">
			<div class="card-header py-2">Saved configs</div>
			<div class="card-body p-2">
	<p id="profiles" class="mb-0"></p>
			</div>
		</section>
		<p id="models" class="d-none"></p>
	</div>
	<input type="text" id="model_info_cont" class="d-none" aria-hidden="true">

	<script>
		baseurl = "";
		//baseurl = "http://ec2co-ecsel-qy18jthyyhk1-1448117639.us-east-1.elb.amazonaws.com:8081/";
		var parts = {};  // populated from /api/parts
		var previewConfig = null;
		var last_stl_urls = {};
		var rotationx = 0;
		var rotationy = 0;
		var rotationz = 0;
		var url_template = baseurl + "render/[NAME].stl";
		var extra_rotate = 0;
		const rot_factor = .65;
		const expl_factor = 25;
		var username = "nick"; // Global username variable
		var partNameToId = {};  // populated from /api/parts
		var previewDebounceTimer = null;
		var PREVIEW_DEBOUNCE_MS = 500;

		//convert from degrees to radians
		function degtorad(deg){ if (deg==0) {return 0; }else{return deg / 57.3;}}
		function button_name(id){ return "b_" + parts[id]['name'];}
		function file_name(id){ return url_template.replace('[NAME]', parts[id]['name']);}
		function $id(id){ return document.getElementById(id);}
		function model_clicked(model_id){ $id('model_info_cont').value=JSON.stringify(stl_viewer.get_model_info(model_id));}

		function do_resize(){
			var height = isNaN(window.innerHeight) ? window.clientHeight : window.innerHeight;
			var width = isNaN(window.innerWidth) ? window.clientWidth : window.innerWidth;
			$id('stl_cont').style.height = height * 0.4 + 'px';
		}

		function slide_change(){
			explode = $id('explode').value * expl_factor/100.0;
			//rotate = $id('rotate').value * rot_factor/100.0;
			for (id in Object.keys(parts)){
				stl_viewer.set_position(id,
					parts[id]['pos'][0] + parts[id]['exp'][0] * explode,
					parts[id]['pos'][1] + parts[id]['exp'][1] * explode,
					parts[id]['pos'][2] + parts[id]['exp'][2] * explode);
				// stl_viewer.rotate(id,
				// 	degtorad(parts[id]['rotf'][0] * rotate),
				// 	degtorad(parts[id]['rotf'][1] * rotate),
				// 	degtorad(parts[id]['rotf'][2] * rotate));
			}
		}

		function mod_loaded(){
			$id('loader').style.display='none';
			$id('stl_cont').style.visibility='visible';
			for (id in Object.keys(parts)){
				stl_viewer.set_position(id, parts[id]['pos'][0], parts[id]['pos'][1], parts[id]['pos'][2]);
			}
		}

		function add_models(ids){
			console.log(ids);
			document.getElementById("loader").src=baseurl + "loader.gif";
			for (k of ids){
				const id = parseInt(k)
				console.log("add" + id);
				const tdobj=$id(button_name(id));
				stl_viewer.add_model({'id': id, 'filename': file_name(id), 'rotationz': degtorad(rotationz)});
				tdobj.onclick = () => rem_models([id]);
			}
		}

		function rem_models(ids){
			console.log(ids);
			//document.getElementById("loader").src=baseurl + "loader.gif";
			for (k of ids){
				const id = parseInt(k)
				console.log("rem" + id);
				const tdobj=$id(button_name(id));
				stl_viewer.remove_model(id);
				tdobj.onclick = () => add_model(id, last_stl_urls[id] || file_name(id));
			}
		}

		function model_drop(model_name){
			model_name=model_name.substring(0, model_name.lastIndexOf('.'));
			add_model(model_name, model_name, null, true);
		}

		function get_json(url) {
			var xhttp = new XMLHttpRequest();
			xhttp.onreadystatechange = function() {
				if (this.readyState == 4 && this.status == 200) {
					json = JSON.parse(this.responseText)
					handle_json(json, url);
				}
			};
			xhttp.open("GET", baseurl + url, true);
			xhttp.setRequestHeader("Content-type", "application/json");
			xhttp.send("");
		}

		function get_current_params() {
			var out = {};
			for (var k in params) {
				if (params[k] && params[k]["Value"] !== undefined) { var n = parseFloat(params[k]["Value"]); out[k] = isNaN(n) ? params[k]["Value"] : n; }
			}
			return out;
		}

		function update_viewer_from_stl_urls(stl_urls) {
			if (!stl_viewer || !stl_urls) return;
			var ids = Object.keys(parts).map(Number).filter(function(id) { return parts[id]; });
			ids.forEach(function(id) { try { stl_viewer.remove_model(id); } catch(e) {} });
			last_stl_urls = {};
			for (var partName in stl_urls) {
				var id = partNameToId[partName];
				if (id !== undefined) {
					var url = baseurl + stl_urls[partName];
					last_stl_urls[id] = url;
					add_model(id, url);
				}
			}
		}

		function set_preview_status(msg, isError) {
			var el = $id('preview_status');
			if (!el) return;
			el.textContent = msg || '';
			el.className = 'small mb-1 ' + (isError ? 'text-danger' : 'text-muted');
		}

		function request_preview() {
			if (previewDebounceTimer) clearTimeout(previewDebounceTimer);
			previewDebounceTimer = setTimeout(function() {
				previewDebounceTimer = null;
				set_preview_status('Updating preview…');
				var body = JSON.stringify(get_current_params());
				var xhttp = new XMLHttpRequest();
				xhttp.onreadystatechange = function() {
					if (this.readyState !== 4) return;
					if (this.status === 200) {
						var res = JSON.parse(this.responseText || "{}");
						if (res.stl_urls && Object.keys(res.stl_urls).length) {
							if (res.previewConfig) apply_preview_config({ previewConfig: res.previewConfig });
							update_viewer_from_stl_urls(res.stl_urls);
							set_preview_status('Preview ready.');
						} else {
							set_preview_status('Preview returned no models.', true);
						}
					} else {
						var err = 'Preview failed';
						try {
							var r = JSON.parse(this.responseText);
							if (r.error) err = r.error;
							if (r.detail) console.error('Preview detail:', r.detail);
						} catch(e) { if (this.responseText) err = this.responseText.slice(0, 120); }
						set_preview_status(err, true);
					}
				};
				xhttp.open("POST", baseurl + "api/preview", true);
				xhttp.setRequestHeader("Content-Type", "application/json");
				xhttp.send(body);
			}, PREVIEW_DEBOUNCE_MS);
		}

		function load_config(cfgName, cfghash) {
			var xhttp = new XMLHttpRequest();
			xhttp.onreadystatechange = function() {
				if (xhttp.readyState !== 4 || xhttp.status !== 200) return;
				var config = JSON.parse(xhttp.responseText || "{}");
				for (var k in config) {
					params[k] = params[k] || {};
					params[k]["Value"] = config[k];
					var el = $id(k);
					if (el) { el.value = config[k]; el.style.backgroundColor = ""; }
				}
				if ($id('configname')) $id('configname').value = cfgName;
				var stl_urls = {};
				for (var p in partNameToId) stl_urls[p] = "/render/" + cfghash + "/" + p + ".stl";
				update_viewer_from_stl_urls(stl_urls);
				request_preview();
			};
			xhttp.open("GET", baseurl + "configs/" + cfghash, true);
			xhttp.setRequestHeader("Content-type", "application/json");
			xhttp.send("");
		}

		function resolve_cfghash(entry) {
			return entry && (typeof entry === "string" ? entry : entry.cfghash);
		}

		do_resize();
		var stl_viewer=new StlViewer(document.getElementById("stl_cont"),{
			auto_resize:true,
			//zoom:-1,
			model_loaded_callback:mod_loaded,
			on_model_mousedown:model_clicked
		});

		var params = {}
		const hide_cols = ['Advanced', 'Hidden']

		function handle_json(json, url){
			console.log("result: " + url);
			if (url.search('/api/parts') > -1) { apply_preview_config(json); }
			if (url.search('/params/') > -1) { fill_params(json, url); request_preview(); }
			if (url.search('/profiles/') > -1) fill_profiles(json);
			if (url.search('/models/') > -1) fill_models(json);
		}

		function _fill_part_buttons(apiParts) {
			var container = document.getElementById('part_buttons_container');
			if (!container) return;
			container.innerHTML = '';
			apiParts.forEach(function(p) {
				var td = document.createElement('td');
				var btn = document.createElement('input');
				btn.type = 'button';
				btn.id = 'b_' + p.id;
				btn.value = p.label || p.id;
				// onclick overridden by add_model when STLs load; this is the toggle-off fallback
				btn.onclick = (function(name) {
					return function() {
						var id = partNameToId[name];
						if (id !== undefined) rem_models([id]);
					};
				})(p.id);
				td.appendChild(btn);
				container.appendChild(td);
			});
		}

		function apply_preview_config(json) {
			if (!json) return;
			// Populate parts and partNameToId from API part list
			if (json.parts && json.parts.length) {
				parts = {};
				partNameToId = {};
				json.parts.forEach(function(p, idx) {
					parts[String(idx)] = {name: p.id, pos: [0,0,0], exp: [0,0,0]};
					partNameToId[p.id] = idx;
				});
				_fill_part_buttons(json.parts);
			}
			if (!json.previewConfig) return;
			previewConfig = json.previewConfig;
			var posOff = previewConfig.positionOffsets || {};
			for (var id in parts) {
				var name = parts[id].name;
				if (posOff[name]) {
					parts[id].pos = [posOff[name][0], posOff[name][1], posOff[name][2]];
				}
			}
		}

		function fill_profiles(json) {
			var configs = json['configs'] || {};
			var table = document.createElement("table");
			table.className = "table table-sm table-bordered";
			var tr = table.insertRow(-1);
			['#', 'Name', 'Load', 'Remove'].forEach(function(h) {
				var th = document.createElement("th"); th.innerHTML = h; tr.appendChild(th);
			});
			var rowNum = 0;
			for (var cfgName in configs) {
				var cfghash = resolve_cfghash(configs[cfgName]);
				if (!cfghash) continue;
				tr = table.insertRow(-1);
				tr.insertCell(-1).innerHTML = ++rowNum;
				tr.insertCell(-1).innerHTML = cfgName;
				var loadBtn = document.createElement("button");
				loadBtn.type = "button";
				loadBtn.className = "btn btn-sm btn-outline-primary";
				loadBtn.textContent = "Load";
				loadBtn.onclick = (function(name, hash) { return function() { load_config(name, hash); }; })(cfgName, cfghash);
				tr.insertCell(-1).appendChild(loadBtn);
				var delBtn = document.createElement("button");
				delBtn.type = "button";
				delBtn.className = "btn btn-sm btn-outline-secondary";
				delBtn.textContent = "Remove";
				delBtn.onclick = (function(name) {
					return function() {
						if (!confirm("Remove saved config \"" + name + "\"?")) return;
						var xhttp = new XMLHttpRequest();
						xhttp.open("DELETE", baseurl + "profile/" + username + "/config/" + encodeURIComponent(name), true);
						xhttp.onreadystatechange = function() { if (xhttp.readyState === 4 && xhttp.status === 204) get_json("/profiles/" + username); };
						xhttp.send();
					};
				})(cfgName);
				tr.insertCell(-1).appendChild(delBtn);
			}
			var divContainer = document.getElementById("profiles");
			divContainer.innerHTML = "";
			divContainer.appendChild(table);
		}

		function fill_models(json){
			var table = document.createElement("table");
			//first key is our parameter name, discover other headers
			var col = ['#'];
			for (var k of Object.keys(json)) { for (var key in json[k]) {
			    if (col.indexOf(key) === -1 && hide_cols.indexOf(key) < 0) { col.push(key); }
            }}
			// CREATE HTML TABLE HEADER ROW USING THE EXTRACTED HEADERS ABOVE.
			var tr = table.insertRow(-1);
			for (var i = 0; i < col.length; i++) {
				var th = document.createElement("th");      // TABLE HEADER.
				th.innerHTML = col[i];
				tr.appendChild(th);
			}

			// ADD JSON DATA TO THE TABLE AS ROWS.
			id = 0;
			for (var k of Object.keys(json)) {
				t = table;
				tr = t.insertRow(-1);
				for (var j = 0; j < col.length; j++) {
					var tabCell = tr.insertCell(-1);
					if (j==0){
						tabCell.innerHTML = t.rows.length-1;
					} else if (j==1){
						tabCell.innerHTML = k;
					}else{
						h = json[k][col[j]];
						tabCell.innerHTML = h;
						if (String(h).search('preview/') > -1){
							//ADD MODEL
							add_model(id, h);
							id++;
						}
					}
				}
			}

			var divContainer = document.getElementById("models");
			divContainer.innerHTML = "";
			divContainer.appendChild(table);
		}

		function add_model(id, url){
			console.log(id + " - model - " + url);
			var opts = {'id': id, 'filename': url, 'rotationz': degtorad(rotationz)};
			if (previewConfig && parts[id]) {
				var name = parts[id].name;
				var rot = (previewConfig.rotateOffsets || {})[name];
				if (rot) {
					opts.rotationx = degtorad(rot[0]);
					opts.rotationy = degtorad(rot[1]);
					opts.rotationz = degtorad(rot[2]);
				}
				var col = (previewConfig.partColors || {})[name];
				if (col) {
					opts.color = '#' + col.map(function(c) { return ('0' + Math.round(c*255).toString(16)).slice(-2); }).join('');
				}
			}
			stl_viewer.add_model(opts);

			const tdobj=$id(button_name(id));
			if (tdobj) tdobj.onclick = function() {rem_models([id]);}
		}

		function fill_params(json, url) {
			var table = document.createElement("table");
			var tablea = document.createElement("table");
			//first key is our parameter name, discover other headers
			var col = ['#', 'Parameter'];
			for (var k of Object.keys(json)) {
				for (var key in json[k]) {
					if (col.indexOf(key) === -1 && hide_cols.indexOf(key) < 0) { col.push(key); }
				}
			}
			// CREATE HTML TABLE HEADER ROW USING THE EXTRACTED HEADERS ABOVE.
			var tr = table.insertRow(-1);
			var tra = tablea.insertRow(-1);                   // TABLE ROW.
			for (var i = 0; i < col.length; i++) {
				var th = document.createElement("th");      // TABLE HEADER.
				th.innerHTML = col[i];
				tr.appendChild(th);

				var th2 = document.createElement("th");
				th2.innerHTML = col[i].replace("Parameter", "Advanced Parameter");
				tra.appendChild(th2);
			}

			// ADD JSON DATA TO THE TABLE AS ROWS.
			for (var k of Object.keys(json)) {
				if (json[k]["Hidden"]){continue;}
				t = (json[k]["Advanced"]) ? tablea : table;
				tr = t.insertRow(-1);
				for (var j = 0; j < col.length; j++) {
					var tabCell = tr.insertCell(-1);
					if (j==0){
						tabCell.innerHTML = t.rows.length-1;
					} else if (j==1){
						tabCell.innerHTML = k;
					} else if (col[j]=='Value'){
						tabCell.innerHTML = "<input name='" + k + "' id='" + k + "' value='" + json[k][col[j]] + "' onchange='on_change(\"" + k + "\");' />";
					}else{
						tabCell.innerHTML = json[k][col[j]];
					}
				}
				// Position offsets now come from previewConfig (apply_preview_config); do not overwrite with legacy posf formula.
			}

			// FINALLY ADD THE NEWLY CREATED TABLE WITH JSON DATA TO A CONTAINER.
			var divContainer = document.getElementById("showData");
			divContainer.innerHTML = "";

			const form = document.createElement("form");
			form.id = "form";
  			form.method = "POST";
			divContainer.appendChild(form);
			form.appendChild(table);

			const nameLabel = document.createElement('label');
			nameLabel.htmlFor = 'configname';
			nameLabel.textContent = 'Save as: ';
			form.appendChild(nameLabel);
			const nameInput = document.createElement('input');
			nameInput.id = 'configname';
			nameInput.type = 'text';
			nameInput.placeholder = 'Config name';
			l = url.replace(/\/+$/,'').split('/');
			nameInput.value = l[l.length-1];
			form.appendChild(nameInput);
			form.appendChild(document.createElement('br'));
			const button = document.createElement('button');
			button.type = 'button';
			button.className = 'btn btn-primary btn-sm mt-1';
			button.innerHTML = 'Save';
			button.onclick = function() { submit(); };
			form.appendChild(button);

			var div2 = document.getElementById("advData");
			div2.innerHTML = "";
			div2.appendChild(tablea);

			slide_change();
		}

		function submit(){
			var cfg = ($id('configname') && $id('configname').value) ? $id('configname').value.trim() : "unnamed";
			if (!cfg) cfg = "unnamed";
			var xhttp = new XMLHttpRequest();
			xhttp.onreadystatechange = function() {
				if (xhttp.readyState !== 4) return;
				if (xhttp.status === 204) {
					get_json("/profiles/" + username);
					alert("Saved as \"" + cfg + "\"");
				} else {
					alert("Save failed: " + (xhttp.responseText || xhttp.status));
				}
			};
			xhttp.open("POST", baseurl + "profile/" + username + "/config/" + encodeURIComponent(cfg), true);
			xhttp.setRequestHeader("Content-Type", "application/json");
			xhttp.send(JSON.stringify(get_current_params()));
		}

		function on_change(k){
			var v = $id(k).value = params[k]["Value"] = minmax($id(k).value, params[k]['Minimum'], params[k]['Maximum'])
			var chg = params[k]["Changed"] = (parseFloat(v) != parseFloat(params[k]["Default"]))
			console.log(k + ": " + JSON.stringify(params[k]) );
			$id(k).style.backgroundColor = chg ? "Green" : "";
			request_preview();
			for (var pk of Object.keys(params)){
				if (params[pk]["Changed"]) console.log(pk);
			}

			//HACK
			// extra_rotate = v;
			// for (id in Object.keys(parts)){
			// 	stl_viewer.rotate(id, 0, 0, degtorad(rotationz + extra_rotate));
			// }

			//stl_viewer.stop_auto_zoom();
			//stl_viewer.set_camera(0, 0, v*3);
		}

		//TODO - create config call
		//TODO - reference config with model build

		function minmax(v, minv, maxv){
			var val = v;
			if (val < minv){ val = minv; }
			if (val > maxv){ val = maxv; }
			return val;
		}

window.addEventListener('load', () => {
				if (location.protocol != 'http:'){
					location.href = 'http:' + window.location.href.substring(window.location.protocol.length);
				}else{
					//add_models([0,1,2,3]);
					const username = "nick";
					// Setup button handlers
					const hideBtn = $id('b_ph');
					const stdBtn = $id('b_pb');
					const advBtn = $id('b_pa');
					if (hideBtn) hideBtn.onclick = () => { $id('advData').hidden = $id('showData').hidden = true; };
					if (stdBtn) stdBtn.onclick = () => { $id('advData').hidden = true; $id('showData').hidden = false; };
					if (advBtn) advBtn.onclick = () => { $id('advData').hidden = false; $id('showData').hidden = true; };
					get_json('/api/parts');
					get_json('/params/all');
					get_json('/profiles/' + username);
				}
			});
